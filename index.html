<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nach Yomi Tracker</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;margin:40px;background:#f7f7f7;color:#222}
.container{max-width:900px;margin:auto;background:white;padding:30px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.1)}
h1{text-align:center}
.stats{display:flex;justify-content:space-around;margin-bottom:10px;font-size:18px}
.cycle{display:flex;justify-content:space-around;margin-bottom:20px;font-size:16px;color:#444}
.current{background:#eef6ff;padding:15px;border-radius:10px;margin-bottom:20px;text-align:center}
button{padding:10px 18px;border:none;border-radius:8px;background:#2d6cdf;color:white;font-size:16px;cursor:pointer}
button:hover{background:#1f4fa8}
ul{list-style:none;padding:0;max-height:400px;overflow-y:auto}
li{padding:6px 0;border-bottom:1px solid #eee}
.completed{text-decoration:line-through;color:gray}
</style>
</head>
<body>
<div class="container">
<h1>Nach Yomi Tracker</h1>

<div class="stats">
<div>Chapters Learned: <span id="chaptersLearned">0</span></div>
<div>Sepharim Completed: <span id="sefarimLearned">0</span></div>
</div>

<div class="cycle">
<div>Cycle Day: <span id="cycleDay">0</span></div>
<div>Days Behind: <span id="daysBehind">0</span></div>
</div>

<div class="current">
<div id="todayText"></div>
<br>
<a id="sefariaLink" target="_blank">Open today's chapter on Sefaria</a>
<br><br>
<button onclick="markComplete()">Mark Today's Chapter Complete</button>
</div>

<h3>Progress</h3>
<ul id="progressList"></ul>

</div>

<script>
// CHANGE THIS if the Nach Yomi cycle started on a different date
// Start date calibrated so that March 8, 2026 = Shoftim (Judges) 1
const cycleStartDate = new Date("2026-02-12");

const books=[
{name:"Joshua",chapters:24},
{name:"Judges",chapters:21},
{name:"I Samuel",chapters:31},
{name:"II Samuel",chapters:24},
{name:"I Kings",chapters:22},
{name:"II Kings",chapters:25},
{name:"Isaiah",chapters:66},
{name:"Jeremiah",chapters:52},
{name:"Ezekiel",chapters:48},
{name:"Hosea",chapters:14},
{name:"Joel",chapters:3},
{name:"Amos",chapters:9},
{name:"Obadiah",chapters:1},
{name:"Jonah",chapters:4},
{name:"Micah",chapters:7},
{name:"Nahum",chapters:3},
{name:"Habakkuk",chapters:3},
{name:"Zephaniah",chapters:3},
{name:"Haggai",chapters:2},
{name:"Zechariah",chapters:14},
{name:"Malachi",chapters:3},
{name:"Psalms",chapters:150},
{name:"Proverbs",chapters:31},
{name:"Job",chapters:42},
{name:"Song of Songs",chapters:8},
{name:"Ruth",chapters:4},
{name:"Lamentations",chapters:5},
{name:"Ecclesiastes",chapters:12},
{name:"Esther",chapters:10},
{name:"Daniel",chapters:12},
{name:"Ezra",chapters:10},
{name:"Nehemiah",chapters:13},
{name:"I Chronicles",chapters:29},
{name:"II Chronicles",chapters:36}
];

let schedule=[];
books.forEach(b=>{
 for(let i=1;i<=b.chapters;i++){
  schedule.push({book:b.name,chapter:i});
 }
});

let progress=JSON.parse(localStorage.getItem("nachProgress")||"0");

function save(){
 localStorage.setItem("nachProgress",progress);
}

function getCycleDay(){
 let today=new Date();
 let diff=today-cycleStartDate;
 return Math.floor(diff/(1000*60*60*24))+1;
}

function update(){
 let learned=progress;
 let sefarim=0;
 let chapterCount=0;

 for(let b of books){
  chapterCount+=b.chapters;
  if(progress>=chapterCount){sefarim++;}
 }

 document.getElementById("chaptersLearned").textContent=learned;
 document.getElementById("sefarimLearned").textContent=sefarim;

 let cycleDay=getCycleDay();
 document.getElementById("cycleDay").textContent=cycleDay;

 let behind=Math.max(0,cycleDay-progress);
 document.getElementById("daysBehind").textContent=behind;

 // Official chapter for today's cycle day
 let todayIndex=Math.max(0,cycleDay-1);
 let today=schedule[todayIndex];

 if(today){
  document.getElementById("todayText").textContent=`Today's Official Chapter: ${today.book} ${today.chapter}`;
  let linkBook=today.book.replace(/ /g,"_");
  document.getElementById("sefariaLink").href=`https://www.sefaria.org/${linkBook}.${today.chapter}?lang=bi`;
 }

 renderList();
}

function markComplete(){
 progress++;
 save();
 update();
}

function renderList(){
 let ul=document.getElementById("progressList");
 ul.innerHTML="";

 schedule.slice(0,300).forEach((c,i)=>{
  let li=document.createElement("li");
  li.textContent=`${c.book} ${c.chapter}`;
  if(i<progress) li.classList.add("completed");
  ul.appendChild(li);
 });
}

update();
</script>

</body>
</html>
