<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nach Yomi Tracker</title>
<style>
body{
 font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
 margin:0;
 background:#f2f4f7;
 color:#1f2933;
}
.container{
 max-width:700px;
 margin:auto;
 padding:30px 20px 40px;
}
h1{
 text-align:center;
 margin-bottom:25px;
}
.card{
 background:white;
 border-radius:14px;
 padding:20px;
 margin-bottom:18px;
 box-shadow:0 6px 18px rgba(0,0,0,.08);
}
.stats{
 display:flex;
 justify-content:space-between;
 font-size:16px;
}
.stat{
 text-align:center;
 flex:1;
}
.stat strong{
 display:block;
 font-size:20px;
 margin-top:4px;
}
.section-title{
 font-weight:600;
 margin-bottom:8px;
}
.chapter{
 font-size:18px;
 margin-bottom:6px;
}
a.button-link{
 display:inline-block;
 margin-top:4px;
 text-decoration:none;
 color:white;
 background:#2563eb;
 padding:8px 14px;
 border-radius:8px;
 font-size:14px;
}
a.button-link:hover{background:#1d4ed8}
button{
 margin-top:12px;
 padding:10px 16px;
 border:none;
 border-radius:10px;
 background:#10b981;
 color:white;
 font-size:15px;
 cursor:pointer;
}
button:hover{background:#059669}
.progressbar{
 height:10px;
 background:#e5e7eb;
 border-radius:8px;
 overflow:hidden;
 margin-top:10px;
}
.progress{
 height:100%;
 background:#3b82f6;
 width:0%;
}
ul{
 list-style:none;
 padding:0;
 margin:0;
 max-height:350px;
 overflow-y:auto;
 font-size:14px;
}
li{
 padding:6px 0;
 border-bottom:1px solid #eee;
}
.completed{
 color:#9ca3af;
 text-decoration:line-through;
}
</style>
</head>
<body>

<div class="container">

<h1>Nach Yomi Tracker</h1>

<div class="card stats">
 <div class="stat">
  Chapters
  <strong id="chaptersLearned">0</strong>
 </div>
 <div class="stat">
  Sefarim
  <strong id="sefarimLearned">0</strong>
 </div>
 <div class="stat">
  Cycle Day
  <strong id="cycleDay">0</strong>
 </div>
 <div class="stat">
  Behind
  <strong id="daysBehind">0</strong>
 </div>
</div>

<div class="card">
 <div class="section-title">Official Chapter Today</div>
 <div id="officialText" class="chapter"></div>
 <a id="officialLink" class="button-link" target="_blank">Open on Sefaria</a>
</div>

<div class="card">
 <div class="section-title">Your Current Chapter</div>
 <div id="userText" class="chapter"></div>
 <a id="userLink" class="button-link" target="_blank">Open on Sefaria</a>
 <br>
 <button onclick="markComplete()">Mark Chapter Complete</button>
</div>

<div class="card">
 <div class="section-title">Overall Progress</div>
 <div class="progressbar"><div id="progress" class="progress"></div></div>
</div>

<div class="card">
 <div class="section-title">Chapter List</div>
 <ul id="progressList"></ul>
</div>

</div>

<script>
// Calibrated so March 8 2026 = Judges 1
const cycleStartDate = new Date("2026-02-13");

const books=[
{name:"Joshua",chapters:24},
{name:"Judges",chapters:21},
{name:"I Samuel",chapters:31},
{name:"II Samuel",chapters:24},
{name:"I Kings",chapters:22},
{name:"II Kings",chapters:25},
{name:"Isaiah",chapters:66},
{name:"Jeremiah",chapters:52},
{name:"Ezekiel",chapters:48},
{name:"Hosea",chapters:14},
{name:"Joel",chapters:3},
{name:"Amos",chapters:9},
{name:"Obadiah",chapters:1},
{name:"Jonah",chapters:4},
{name:"Micah",chapters:7},
{name:"Nahum",chapters:3},
{name:"Habakkuk",chapters:3},
{name:"Zephaniah",chapters:3},
{name:"Haggai",chapters:2},
{name:"Zechariah",chapters:14},
{name:"Malachi",chapters:3},
{name:"Psalms",chapters:150},
{name:"Proverbs",chapters:31},
{name:"Job",chapters:42},
{name:"Song of Songs",chapters:8},
{name:"Ruth",chapters:4},
{name:"Lamentations",chapters:5},
{name:"Ecclesiastes",chapters:12},
{name:"Esther",chapters:10},
{name:"Daniel",chapters:12},
{name:"Ezra",chapters:10},
{name:"Nehemiah",chapters:13},
{name:"I Chronicles",chapters:29},
{name:"II Chronicles",chapters:36}
];

let schedule=[];
books.forEach(b=>{
 for(let i=1;i<=b.chapters;i++){
  schedule.push({book:b.name,chapter:i});
 }
});

const totalChapters=schedule.length;

let progress=JSON.parse(localStorage.getItem("nachProgress")||"0");

function save(){
 localStorage.setItem("nachProgress",progress);
}

function getCycleDay(){
 let today = new Date();
 today.setHours(0,0,0,0);

 let start = new Date(cycleStartDate);
 start.setHours(0,0,0,0);

 let diff = today - start;
 return Math.floor(diff / (1000*60*60*24)) + 1;
}

function makeLink(book,chapter){
 let linkBook=book.replace(/ /g,"_");
 return `https://www.sefaria.org/${linkBook}.${chapter}?lang=bi`;
}

function update(){

 document.getElementById("chaptersLearned").textContent=progress;

 let sefarim=0;
 let chapterCount=0;

 for(let b of books){
  chapterCount+=b.chapters;
  if(progress>=chapterCount) sefarim++;
 }

 document.getElementById("sefarimLearned").textContent=sefarim;

 let cycleDay=getCycleDay();
 document.getElementById("cycleDay").textContent=cycleDay;

 let behind=Math.max(0,cycleDay-progress);
 document.getElementById("daysBehind").textContent=behind;

 let official=schedule[Math.max(0,cycleDay-1)];
 if(official){
  document.getElementById("officialText").textContent=`${official.book} ${official.chapter}`;
  document.getElementById("officialLink").href=makeLink(official.book,official.chapter);
 }

 let user=schedule[progress];
 if(user){
  document.getElementById("userText").textContent=`${user.book} ${user.chapter}`;
  document.getElementById("userLink").href=makeLink(user.book,user.chapter);
 }

 let percent=(progress/totalChapters)*100;
 document.getElementById("progress").style.width=percent+"%";

 renderList();
}

function markComplete(){
 progress++;
 save();
 update();
}

function renderList(){
 let ul=document.getElementById("progressList");
 ul.innerHTML="";

 schedule.forEach((c,i)=>{
  let li=document.createElement("li");
  li.textContent=`${c.book} ${c.chapter}`;
  if(i<progress) li.classList.add("completed");
  ul.appendChild(li);
 });
}

update();
</script>

</body>
</html>
