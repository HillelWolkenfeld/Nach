<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nach Yomi Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Nach Yomi Tracker</h1>
        </header>
        <div class="card">
            <h2>Current Chapter: <span id="current-chapter">Chapter 1</span></h2>
            <div class="progress-bar">
                <div class="progress" style="width: 30%;"></div>
            </div>
            <p>Progress: <span id="progress-percentage">30%</span></p>
        </div>
        <div class="official-chapters">
            <h3>Official Chapters</h3>
            <ul>
                <li>Official Chapter 1</li>
                <li>Official Chapter 2</li>
            </ul>
        </div>
        <div class="current-chapters">
            <h3>Current Chapters</h3>
            <ul>
                <li>Current Chapter: Chapter 1</li>
            </ul>
        </div>
    </div>
</body>
</html>
